function PresentationView({ squad, game, onExit }) {
  const [slide, setSlide] = useState(0);
  const [presTheme, setPresTheme] = useState("dark");
  const [showQr, setShowQr] = useState(false);
  const focusImages = game.focusImages || [];
  const SLIDES = ["Gegner", "Spielidee", ...focusImages.map((_, i) => `Fokus ${i + 1}`), "Aufstellung"];

  useEffect(() => {
    const el = document.documentElement;
    if (el.requestFullscreen) {
      el.requestFullscreen().catch(() => {});
    }
    const onKey = (e) => {
      if (e.key === "Escape") onExit();
      else if (e.key === "ArrowRight") setSlide((s) => Math.min(SLIDES.length - 1, s + 1));
      else if (e.key === "ArrowLeft") setSlide((s) => Math.max(0, s - 1));
    };
    window.addEventListener("keydown", onKey);
    return () => {
      window.removeEventListener("keydown", onKey);
      if (document.fullscreenElement && document.exitFullscreen) {
        document.exitFullscreen().catch(() => {});
      }
    };
    // eslint-disable-next-line react-hooks/exhaustive-deps
  }, []);

  const slots = FORMATIONS[game.formation] || FORMATIONS["4-4-2"];
  const lineup = game.lineup || {};
  const matchSquad = game.matchSquad || [];
  const assignedIds = Object.values(lineup).map((v) => v?.playerId).filter(Boolean);
  const getPlayer = (id) => squad.find((p) => p.id === id);
  const bench = squad.filter((p) => matchSquad.includes(p.id) && !assignedIds.includes(p.id));

  const duplicateNumberIds = useMemo(() => {
    const entries = [
      ...Object.values(lineup)
        .filter((e) => e?.playerId)
        .map((e) => ({ id: e.playerId, number: e.number })),
      ...bench.map((p) => ({ id: p.id, number: game.benchNumbers?.[p.id] ?? p.number })),
    ];
    return findDuplicateNumbers(entries);
    // eslint-disable-next-line react-hooks/exhaustive-deps
  }, [lineup, bench, game.benchNumbers]);

  const shareText = useMemo(() => {
    const lineupNumbers = {};
    Object.values(lineup).forEach((entry) => {
      if (entry?.playerId) lineupNumbers[entry.playerId] = entry.number;
    });
    const kaderLines = matchSquad
      .map((id) => getPlayer(id))
      .filter(Boolean)
      .sort((a, b) => {
        const na = Number(lineupNumbers[a.id] ?? a.number) || 99;
        const nb = Number(lineupNumbers[b.id] ?? b.number) || 99;
        return na - nb;
      })
      .map((p) => `${lineupNumbers[p.id] ?? p.number ?? "–"} – ${p.name}`)
      .join("\n");
    const lines = [
      `TuS Haren 2 vs. ${game.opponentName || "–"}`,
      `${formatDateDE(game.date) || ""} ${game.kickoff ? `${game.kickoff} Uhr` : ""}`.trim(),
      game.meetingTime ? `Treffpunkt: ${game.meetingTime}` : "",
      game.jerseyColor ? `Trikot: ${game.jerseyColor}` : "",
      "",
      "Kader:",
      kaderLines,
    ].filter((l) => l !== "");
    return lines.join("\n");
    // eslint-disable-next-line react-hooks/exhaustive-deps
  }, [game, matchSquad, lineup, squad]);

  const qrUrl = `https://api.qrserver.com/v1/create-qr-code/?size=280x280&data=${encodeURIComponent(
    `https://wa.me/?text=${encodeURIComponent(shareText)}`
  )}`;

  const goPrev = () => setSlide((s) => Math.max(0, s - 1));
  const goNext = () => setSlide((s) => Math.min(SLIDES.length - 1, s + 1));

  return (
    <div className="min-h-screen bg-[var(--bg-page)] flex flex-col p-8 relative" style={THEME_VARS[presTheme]}>
      <div className="absolute top-6 right-6 flex items-center gap-2">
        <button
          onClick={() => setShowQr(true)}
          className="flex items-center justify-center text-[var(--text-secondary)] hover:text-[var(--text-primary)] border border-[var(--border-card)] rounded-md w-9 h-9"
          title="QR-Code für Spieler anzeigen"
        >
          <QrCode size={16} />
        </button>
        <button
          onClick={() => setPresTheme((t) => (t === "dark" ? "light" : "dark"))}
          className="flex items-center justify-center text-[var(--text-secondary)] hover:text-[var(--text-primary)] border border-[var(--border-card)] rounded-md w-9 h-9"
          title={presTheme === "dark" ? "Zu Hell wechseln" : "Zu Dunkel wechseln"}
        >
          {presTheme === "dark" ? <Sun size={16} /> : <Moon size={16} />}
        </button>
        <button
          onClick={onExit}
          className="text-[var(--text-secondary)] hover:text-[var(--text-primary)] border border-[var(--border-card)] rounded-md px-3 py-2 text-sm flex items-center gap-1.5"
        >
          <X size={16} /> Beenden (Esc)
        </button>
      </div>

      <div className="flex items-center gap-5 mb-6">
        <ClubCrest size={64} />
        <div>
          <h1 className="text-[var(--text-primary)] text-3xl font-bold tracking-wide flex items-center gap-3" style={{ fontFamily: "'Oswald', sans-serif" }}>
            TUS HAREN 2
            {game.opponentName && (
              <>
                <span className="text-[var(--text-tertiary)] text-xl font-normal">vs.</span>
                {game.opponentLogo && (
                  <img src={game.opponentLogo} alt="" className="w-10 h-10 rounded-full object-cover border-2 border-white/20" />
                )}
                {game.opponentName}
              </>
            )}
          </h1>
          <div className="flex flex-wrap gap-4 mt-1 text-[var(--text-secondary)] text-lg">
            {game.date && <span>{formatDateDE(game.date)}</span>}
            {game.kickoff && <span>{game.kickoff} Uhr</span>}

          )
        ))}

        {slide === SLIDES.length - 1 && (
          <div className="w-full">
            <div
              className="relative w-full max-w-3xl mx-auto rounded-2xl border-2 border-white/20 overflow-hidden shadow-2xl"
              style={{
                aspectRatio: "0.7",
                background: "repeating-linear-gradient(to bottom, #1d5a3d 0, #1d5a3d 11.11%, #1a5236 11.11%, #1a5236 22.22%)",
              }}
            >
              <div className="absolute inset-4 border-2 border-white/30 rounded-sm pointer-events-none" />
              <div className="absolute top-1/2 left-4 right-4 h-0.5 bg-white/30 -translate-y-1/2 pointer-events-none" />
              <div className="absolute left-1/2 top-1/2 w-28 h-28 border-2 border-white/30 rounded-full -translate-x-1/2 -translate-y-1/2 pointer-events-none" />
              <div className="absolute left-1/2 top-1/2 w-1.5 h-1.5 bg-white/40 rounded-full -translate-x-1/2 -translate-y-1/2 pointer-events-none" />
              <div className="absolute left-1/2 bottom-4 w-2/5 h-[15%] border-2 border-white/30 border-b-0 -translate-x-1/2 pointer-events-none" />
              <div className="absolute left-1/2 bottom-4 w-1/5 h-[6%] border-2 border-white/30 border-b-0 -translate-x-1/2 pointer-events-none" />
              <div className="absolute left-1/2 top-4 w-2/5 h-[15%] border-2 border-white/30 border-t-0 -translate-x-1/2 pointer-events-none" />
              <div className="absolute left-1/2 top-4 w-1/5 h-[6%] border-2 border-white/30 border-t-0 -translate-x-1/2 pointer-events-none" />

              <div
                className="absolute left-0 right-0 border-t-2 border-dashed pointer-events-none z-10"
                style={{ top: `${game.pressingLine ?? 50}%`, borderColor: "#ffd54a" }}
              >
                <div
                  className="absolute left-3 -translate-y-1/2 text-[10px] font-bold px-2 py-0.5 rounded-full shadow"
                  style={{ background: "#ffd54a", color: "#122e23" }}
                >
                  Pressing
                </div>
              </div>

              {slots.map((slot) => {
                const entry = lineup[slot.id];
                const p = entry ? getPlayer(entry.playerId) : null;
                return (
                  <div
                    key={slot.id}
                    className="absolute -translate-x-1/2 -translate-y-1/2 flex flex-col items-center z-20"
                    style={{ left: `${slot.x}%`, top: `${slot.y}%` }}
                  >
                    <div className="bg-white rounded-xl px-3 py-2 shadow-lg text-center whitespace-nowrap border-b-4 border-[#c8102e]">
                      <div className="text-[#12271e] font-bold text-base leading-tight" style={{ fontFamily: "'Oswald', sans-serif" }}>
                        {p ? p.name : slot.label}
                      </div>
                      {p && (
                        <div className="flex items-center justify-center gap-1 mt-0.5">
                          <span
                            className={
                              "text-white text-[10px] font-bold rounded-full min-w-[18px] h-[18px] px-1 flex items-center justify-center" +
                              (duplicateNumberIds.has(p.id) ? " ring-2 ring-offset-1 ring-[#e08a2e]" : "")
                            }
                            style={{ background: duplicateNumberIds.has(p.id) ? "#e08a2e" : "#c8102e" }}
                            title={duplicateNumberIds.has(p.id) ? "Doppelt vergebene Rückennummer!" : undefined}
                          >
                            {entry.number || p.number || "–"}
                          </span>
                          <span className="text-[#6b6558] text-[10px] font-semibold uppercase tracking-wide">
                            {entry.position || slot.label}
                          </span>
                        </div>
                      )}
                    </div>
                  </div>
                );
              })}
            </div>

            {duplicateNumberIds.size > 0 && (
              <p className="max-w-3xl mx-auto mt-4 text-center text-[#e08a2e] text-sm font-semibold">
                ⚠️ Orange markierte Nummern werden doppelt vergeben – bitte korrigieren.
              </p>
            )}

            <div className="max-w-3xl mx-auto mt-6">
              <h2 className="text-[var(--text-primary)] text-lg font-semibold mb-3 text-center" style={{ fontFamily: "'Oswald', sans-serif" }}>
                Bank
              </h2>
              {bench.length === 0 ? (
                <p className="text-[var(--text-tertiary)] text-sm text-center">Keine Bankspieler eingetragen.</p>
              ) : (
                <div className="flex flex-wrap gap-2 justify-center">
                  {bench.map((p) => (
                    <div key={p.id} className="bg-white rounded-xl px-3 py-2 shadow-lg border-b-4 border-[#c8102e] flex items-center gap-2">
                      <span
                        className={
                          "text-white text-[10px] font-bold rounded-full min-w-[20px] h-[20px] px-1 flex items-center justify-center shrink-0" +
                          (duplicateNumberIds.has(p.id) ? " ring-2 ring-offset-1 ring-[#e08a2e]" : "")
                        }
                        style={{ background: duplicateNumberIds.has(p.id) ? "#e08a2e" : "#c8102e" }}
                        title={duplicateNumberIds.has(p.id) ? "Doppelt vergebene Rückennummer!" : undefined}
                      >
                        {game.benchNumbers?.[p.id] ?? p.number ?? "–"}
                      </span>
                      <span className="text-[#12271e] font-bold text-sm whitespace-nowrap" style={{ fontFamily: "'Oswald', sans-serif" }}>
                        {p.name}
                      </span>
                    </div>
                  ))}
                </div>
              )}
            </div>
          </div>
        )}
      </div>


      <div className="flex items-center justify-center gap-3 mt-8">
        <button
          onClick={goPrev}
          disabled={slide === 0}
          className="text-[var(--text-secondary)] hover:text-[var(--text-primary)] disabled:opacity-30 disabled:hover:text-[var(--text-secondary)] border border-[var(--border-card)] rounded-md p-2"
        >
          <ChevronLeft size={18} />
        </button>
        {SLIDES.map((label, i) => (
          <button
            key={label}
            onClick={() => setSlide(i)}
            className={
              "text-xs font-semibold px-3 py-1.5 rounded-full border transition-colors " +
              (slide === i
                ? "bg-[#c8102e] border-[#c8102e] text-white"
                : "border-[var(--border-card)] text-[var(--text-secondary)] hover:text-[var(--text-primary)]")
            }
          >
            {label}
          </button>
        ))}
        <button
          onClick={goNext}
          disabled={slide === SLIDES.length - 1}
          className="text-[var(--text-secondary)] hover:text-[var(--text-primary)] disabled:opacity-30 disabled:hover:text-[var(--text-secondary)] border border-[var(--border-card)] rounded-md p-2"
        >
          <ChevronRight size={18} />
        </button>
      </div>

      {showQr && (
        <div
          className="fixed inset-0 bg-black/80 flex items-center justify-center z-50 px-4"
          onClick={() => setShowQr(false)}
        >
          <div
            className="bg-white rounded-2xl p-6 flex flex-col items-center max-w-xs"
            onClick={(e) => e.stopPropagation()}
          >
            <img src={qrUrl} alt="QR-Code mit Kader und Spieltag-Infos" className="w-64 h-64" />
            <p className="text-[#122e23] text-sm mt-3 text-center">
              Scannen öffnet WhatsApp mit Kader &amp; Spieltag-Infos vorausgefüllt
            </p>
            <button
              onClick={() => setShowQr(false)}
              className="mt-4 text-xs text-stone-500 hover:text-stone-700 underline"
            >
              Schließen
            </button>
          </div>
        </div>
      )}
    </div>
  );
}

export default function App() {
  const [authChecked, setAuthChecked] = useState(false);
  const [user, setUser] = useState(null);
  const [tab, setTab] = useState("kader");
  const [theme, setThemeState] = useState(() => {
    try {
      return localStorage.getItem("tush2-theme") || "dark";
    } catch {
      return "dark";
    }
  });
  const [presenting, setPresenting] = useState(false);

  const toggleTheme = () => {
    const next = theme === "dark" ? "light" : "dark";
    setThemeState(next);
    try {
      localStorage.setItem("tush2-theme", next);
    } catch {}
  };

  useEffect(() => {
    const unsub = onAuthStateChanged(auth, (u) => {
      setUser(u);
      setAuthChecked(true);
    });
    return unsub;
  }, []);

  const [squad, setSquad, squadLoaded] = useFirestoreValue("squad", []);
  const [game, setGame, gameLoaded] = useFirestoreValue("currentGame", emptyGame);
  const [matches, setMatches, matchesLoaded] = useFirestoreValue("matches", []);
  const [creds, setCreds, credsLoaded] = useFirestoreValue("credentials", []);
  const [schedule, setSchedule, scheduleLoaded] = useFirestoreValue("schedule", []);
  const [gameHistory, setGameHistory, gameHistoryLoaded] = useFirestoreValue("gameHistory", []);
  const [laundry, setLaundry, laundryLoaded] = useFirestoreValue("laundry", []);

  const allLoaded = squadLoaded && gameLoaded && matchesLoaded && credsLoaded && scheduleLoaded && gameHistoryLoaded && laundryLoaded;

  if (!authChecked) {
    return (
      <div className="min-h-screen bg-[var(--bg-page)] flex items-center justify-center text-[var(--text-secondary)] text-sm" style={THEME_VARS[theme]}>
        Lädt …
      </div>
    );
  }

  if (!user) return <div style={THEME_VARS[theme]}><AuthGate onAuthed={() => {}} /></div>;

  if (!allLoaded) {
    return (
      <div className="min-h-screen bg-[var(--bg-page)] flex items-center justify-center text-[var(--text-secondary)] text-sm" style={THEME_VARS[theme]}>
        Lädt Daten …
      </div>
    );
  }

  if (presenting) {
    return (
      <div style={THEME_VARS[theme]}>
        <PresentationView squad={squad} game={game} onExit={() => setPresenting(false)} />
      </div>
    );
  }

  return (
    <div className="min-h-screen bg-[var(--bg-page)]" style={{ fontFamily: "'Inter', sans-serif", ...THEME_VARS[theme] }}>
      <header className="border-b border-[var(--border-card)] px-4 sm:px-6 py-4 flex items-center justify-between">
        <div className="flex items-center gap-3">
          <ClubCrest size={36} />
          <div>
            <h1 className="text-[var(--text-primary)] text-lg leading-tight tracking-wide" style={{ fontFamily: "'Oswald', sans-serif" }}>
              TUS HAREN 2
            </h1>
            <p className="text-[var(--text-tertiary)] text-[11px] uppercase tracking-widest leading-tight">Spielvorbereitung</p>
          </div>
        </div>
        <div className="flex items-center gap-2">
          <span className="hidden sm:block text-xs text-[var(--text-secondary)] mr-1">{user.email}</span>
          <button
            onClick={() => setPresenting(true)}
            className="flex items-center gap-1.5 text-xs text-[var(--text-secondary)] hover:text-[var(--text-primary)] border border-[var(--border-card)] rounded-md px-2.5 py-1.5"
            title="Präsentationsmodus für TV/Beamer"
          >
            <Monitor size={13} /> Präsentation
          </button>
          <button
            onClick={toggleTheme}
            className="flex items-center justify-center text-[var(--text-secondary)] hover:text-[var(--text-primary)] border border-[var(--border-card)] rounded-md w-8 h-8"
            title={theme === "dark" ? "Zu Hell wechseln" : "Zu Dunkel wechseln"}
          >
            {theme === "dark" ? <Sun size={14} /> : <Moon size={14} />}
          </button>
          <button
            onClick={() => signOut(auth)}
            className="flex items-center gap-1.5 text-xs text-[var(--text-secondary)] hover:text-[var(--text-primary)] border border-[var(--border-card)] rounded-md px-2.5 py-1.5"
          >
            <LogOut size={13} /> Abmelden
          </button>
        </div>
      </header>

      <nav className="flex overflow-x-auto border-b border-[var(--border-card)] px-2 sm:px-6">
        {TABS.map((t) => {
          const Icon = t.icon;
          const active = tab === t.id;
          return (
            <button
              key={t.id}
              onClick={() => setTab(t.id)}
              className={
                "flex items-center gap-1.5 px-4 py-3 text-sm font-medium whitespace-nowrap border-b-2 transition-colors " +
                (active ? "border-[#c8102e] text-[var(--text-primary)]" : "border-transparent text-[var(--text-secondary)] hover:text-[var(--text-body)]")
              }
            >
              <Icon size={15} /> {t.label}
            </button>
          );
        })}
      </nav>

      <main className="px-4 sm:px-6 py-6">
        {tab === "kader" && <KaderTab squad={squad} setSquad={setSquad} matches={matches} />}
        {tab === "spiel" && <GameTab squad={squad} game={game} setGame={setGame} matches={matches} setMatches={setMatches} schedule={schedule} setSchedule={setSchedule} gameHistory={gameHistory} setGameHistory={setGameHistory} />}
        {tab === "statistik" && <StatsTab matches={matches} setMatches={setMatches} />}
        {tab === "waesche" && <LaundryTab squad={squad} schedule={schedule} laundry={laundry} setLaundry={setLaundry} />}
        {tab === "info" && <InfoTab creds={creds} setCreds={setCreds} />}
      </main>
    </div>
  );
}

const rootEl = document.getElementById("root");
ReactDOM.createRoot(rootEl).render(<App />);
    </script>
  </body>
</html>
