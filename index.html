/* ---------------------------------------------------------------------- */
/*  Firestore-Hook mit Echtzeit-Sync (ersetzt die alte useFirestoreValue.js) */
/* ---------------------------------------------------------------------- */

function useFirestoreValue(key, fallback) {
  const [value, setValueState] = useState(fallback);
  const [loaded, setLoaded] = useState(false);
  const writingRef = React.useRef(false);

  useEffect(() => {
    const ref = doc(db, COLLECTION, key);
    const unsub = onSnapshot(
      ref,
      (snap) => {
        if (writingRef.current) {
          writingRef.current = false;
          return;
        }
        if (snap.exists() && snap.data().value !== undefined) {
          setValueState(snap.data().value);
        } else {
          setValueState(fallback);
        }
        setLoaded(true);
      },
      (err) => {
        console.error(`Firestore-Fehler bei ${key}:`, err);
        setLoaded(true);
      }
    );
    return unsub;
    // eslint-disable-next-line react-hooks/exhaustive-deps
  }, [key]);

  const setValue = useCallback(
    async (next) => {
      setValueState(next);
      writingRef.current = true;
      try {
        await setDoc(doc(db, COLLECTION, key), { value: next, updatedAt: Date.now() });
      } catch (err) {
        console.error(`Konnte ${key} nicht speichern:`, err);
        writingRef.current = false;
      }
    },
    [key]
  );

  return [value, setValue, loaded];
}

function formatDateDE(iso) {
  if (!iso) return "";
  const [y, m, d] = iso.split("-");
  if (!y || !m || !d) return iso;
  return `${d}.${m}.${y}`;
}

function shortName(fullName) {
  if (!fullName) return "";
  const parts = fullName.trim().split(/\s+/);
  if (parts.length < 2) return fullName;
  return `${parts[0][0]}. ${parts[parts.length - 1]}`;
}

function initials(fullName) {
  if (!fullName) return "?";
  const parts = fullName.trim().split(/\s+/);
  if (parts.length < 2) return parts[0]?.[0]?.toUpperCase() || "?";
  return (parts[0][0] + parts[parts.length - 1][0]).toUpperCase();
}

function computePlayerStats(playerId, matches) {
  let apps = 0, minutes = 0, goals = 0, assists = 0, yellow = 0, red = 0, subIn = 0, subOut = 0;
  (matches || [])
    .filter((m) => (m.matchType || "Liga") === "Liga")
    .forEach((m) => {
      const appearance = (m.appearances || []).find((a) => a.id === playerId);
      const inGoals = (m.goals || []).some((g) => g.playerId === playerId || g.assistId === playerId);
      const inCards = (m.cards || []).some((c) => c.playerId === playerId);
      const inSubs = (m.subs || []).some((s) => s.inId === playerId || s.outId === playerId);
      if (appearance || inGoals || inCards || inSubs) {
        apps += 1;
        minutes += Number(appearance?.minutes) || 0;
      }
      (m.goals || []).forEach((g) => {
        if (g.playerId === playerId) goals += 1;
        if (g.assistId === playerId) assists += 1;
      });
      (m.cards || []).forEach((c) => {
        if (c.playerId === playerId) {
          if (c.type === "Gelb") yellow += 1;
          else red += 1;
        }
      });
      (m.subs || []).forEach((s) => {
        if (s.inId === playerId) subIn += 1;
        if (s.outId === playerId) subOut += 1;
      });
    });
  const avgMinutes = apps > 0 ? Math.round(minutes / apps) : 0;
  const contributions = goals + assists;
  const scorerPerGame = apps > 0 ? Math.round((contributions / apps) * 100) / 100 : 0;
  const minutesPerScorer = contributions > 0 ? Math.round(minutes / contributions) : null;
  return { apps, minutes, avgMinutes, goals, assists, scorerPerGame, minutesPerScorer, yellow, red, subIn, subOut };
}

function findDuplicateNumbers(entries) {
  const counts = {};
  entries.forEach(({ number }) => {
    if (number === "" || number == null) return;
    counts[number] = (counts[number] || 0) + 1;
  });
  const dupSet = new Set();
  entries.forEach(({ id, number }) => {
    if (number !== "" && number != null && counts[number] > 1) dupSet.add(id);
  });
  return dupSet;
}

function resizeImageFile(file, maxSize = 200) {
  return new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.onload = (e) => {
      const img = new Image();
      img.onload = () => {
        const canvas = document.createElement("canvas");
        canvas.width = maxSize;
        canvas.height = maxSize;
        const ctx = canvas.getContext("2d");
        const scale = Math.max(maxSize / img.width, maxSize / img.height);
        const w = img.width * scale;
        const h = img.height * scale;
        ctx.drawImage(img, (maxSize - w) / 2, (maxSize - h) / 2, w, h);
        resolve(canvas.toDataURL("image/jpeg", 0.75));
      };
      img.onerror = reject;
      img.src = e.target.result;
    };
    reader.onerror = reject;
    reader.readAsDataURL(file);
  });
}

function resizeImageFileFit(file, maxDim = 1100) {
  return new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.onload = (e) => {
      const img = new Image();
      img.onload = () => {
        let { width, height } = img;
        if (width > maxDim || height > maxDim) {
          const scale = Math.min(maxDim / width, maxDim / height);
          width = Math.round(width * scale);
          height = Math.round(height * scale);
        }
        const canvas = document.createElement("canvas");
        canvas.width = width;
        canvas.height = height;
        const ctx = canvas.getContext("2d");
        ctx.drawImage(img, 0, 0, width, height);
        resolve(canvas.toDataURL("image/jpeg", 0.72));
      };
      img.onerror = reject;
      img.src = e.target.result;
    };
    reader.onerror = reject;
    reader.readAsDataURL(file);
  });
}

async function copyToClipboard(text) {
  try {
    await navigator.clipboard.writeText(text);
    return true;
  } catch {
    try {
      const ta = document.createElement("textarea");
      ta.value = text;
      ta.style.position = "fixed";
      ta.style.opacity = "0";
      document.body.appendChild(ta);
      ta.focus();
      ta.select();
      const ok = document.execCommand("copy");
      document.body.removeChild(ta);
      return ok;
    } catch {
      return false;
    }
  }
}

function normalizeTeamName(s) {
  return (s || "")
    .toLowerCase()
    .replace(/ii\b/g, "2")
    .replace(/iii\b/g, "3")
    .replace(/[^a-zäöüß0-9]/g, "");
}

function parseFussballDeSchedule(text, ourKeyword) {
  if (!text || !text.trim()) return [];
  const lines = text.split(/\r?\n/);
  const dateTimeRe = /(\d{1,2})\.(\d{1,2})\.(\d{2,4})\D{0,10}?(\d{1,2}):(\d{2})/;
  const weekdayRe = /^(Mo|Di|Mi|Do|Fr|Sa|So)[.,]?$/i;
  const codeRe = /^[A-ZÄÖÜ]{1,3}\s*\|\s*\d+$/;
  const junkRe = /^(zum spiel|:|-|–)$/i;

  const splitCells = (line) =>
    line
      .split(/\t|\s{2,}|\|(?!\s*\d{1,2}:\d{2})/)
      .map((c) => c.trim())
      .filter(Boolean);

  const fixtures = [];
  let current = null;
  const pushCurrent = () => {
    if (current && current.home && current.away) fixtures.push(current);
    current = null;
  };

  for (const line of lines) {
    const cells = splitCells(line);
    const dtMatch = line.match(dateTimeRe);
    if (dtMatch) {
      pushCurrent();
      let [, d, m, y, hh, mm] = dtMatch;
      if (y.length === 2) y = (Number(y) < 50 ? "20" : "19") + y;
      d = d.padStart(2, "0");
      m = m.padStart(2, "0");
      const competition = cells.find(
        (c) => !dateTimeRe.test(c) && !codeRe.test(c) && !weekdayRe.test(c) && c.length > 2
      );
      current = {
        date: `${y}-${m}-${d}`,
        time: `${hh.padStart(2, "0")}:${mm}`,
        competition: competition || "",
        home: null,
        away: null,
      };
      continue;
    }
    if (current && (!current.home || !current.away)) {
      const sepIdx = cells.findIndex((c) => c === ":" || c === "-");
      if (sepIdx > 0 && cells[sepIdx - 1] && cells[sepIdx + 1]) {
        current.home = cells[sepIdx - 1];
        current.away = cells[sepIdx + 1];
      } else {
        const candidates = cells.filter((c) => !junkRe.test(c) && c.length > 1);
        if (candidates.length >= 2 && !current.home) {
          current.home = candidates[0];
          current.away = candidates[1];
        }
      }
    }
  }
  pushCurrent();

  const kw = normalizeTeamName(ourKeyword || "haren");
  return fixtures.map((f) => {
    const homeIsUs = normalizeTeamName(f.home).includes(kw);
    const awayIsUs = normalizeTeamName(f.away).includes(kw);
    let opponent, homeAway;
    if (homeIsUs) {
      opponent = f.away;
      homeAway = "Heim";
    } else if (awayIsUs) {
      opponent = f.home;
      homeAway = "Auswärts";
    } else {
      opponent = f.away;
      homeAway = "Heim";
    }
    let matchType = "Liga";
    const comp = (f.competition || "").toLowerCase();
    if (comp.includes("pokal")) matchType = "Pokal";
    else if (comp.includes("freundschaft")) matchType = "Testspiel";
    return {
      id: uid(),
      date: f.date,
      time: f.time,
      competition: f.competition,
      opponent,
      homeAway,
      matchType,
    };
  });
}

function AuthGate({ onAuthed }) {
  const [mode, setMode] = useState("signin"); // "signin" | "signup"
  const [email, setEmail] = useState("");
  const [password, setPassword] = useState("");
  const [show, setShow] = useState(false);
  const [error, setError] = useState("");
  const [busy, setBusy] = useState(false);

  const submit = async () => {
    setError("");
    if (!email.trim() || password.length < 6) {
      setError("E-Mail und ein Passwort mit mindestens 6 Zeichen eingeben.");
      return;
    }
    setBusy(true);
    try {
      if (mode === "signin") {
        await signInWithEmailAndPassword(auth, email.trim(), password);
      } else {
        await createUserWithEmailAndPassword(auth, email.trim(), password);
      }
      onAuthed();
    } catch (err) {
      const map = {
        "auth/invalid-credential": "E-Mail oder Passwort falsch.",
        "auth/wrong-password": "E-Mail oder Passwort falsch.",
        "auth/user-not-found": "Kein Konto mit dieser E-Mail gefunden.",
        "auth/email-already-in-use": "Für diese E-Mail existiert bereits ein Konto.",
        "auth/weak-password": "Passwort ist zu schwach (mind. 6 Zeichen).",
        "auth/invalid-email": "Ungültige E-Mail-Adresse.",
      };
      setError(map[err.code] || "Etwas ist schiefgelaufen. Bitte erneut versuchen.");
    } finally {
      setBusy(false);
    }
  };

  return (
    <div className="min-h-screen bg-[var(--bg-page)] flex items-center justify-center px-4 relative overflow-hidden">
      <div
        className="absolute inset-0 opacity-[0.05] pointer-events-none"

        </button>
      </div>
    </div>
  );
}

function GameTab({ squad, game, setGame, matches, setMatches, schedule, setSchedule, gameHistory, setGameHistory }) {
  const [section, setSection] = useState("vorbereitung");
  const [pasteText, setPasteText] = useState("");
  const [importInfo, setImportInfo] = useState("");
  const [viewingHistory, setViewingHistory] = useState(null);
  const slots = FORMATIONS[game.formation] || FORMATIONS["4-4-2"];
  const matchSquad = game.matchSquad || [];
  const lineup = game.lineup || {};
  const assignedIds = Object.values(lineup).map((v) => v?.playerId).filter(Boolean);
  const bench = squad.filter((p) => matchSquad.includes(p.id) && !assignedIds.includes(p.id));
  const benchNumbers = game.benchNumbers || {};
  const report = game.report || emptyGame.report;
  const pressingLine = game.pressingLine ?? 50;

  const getPlayer = (id) => squad.find((p) => p.id === id);

  const duplicateNumberIds = useMemo(() => {
    const entries = [
      ...Object.values(lineup)
        .filter((e) => e?.playerId)
        .map((e) => ({ id: e.playerId, number: e.number })),
      ...bench.map((p) => ({ id: p.id, number: benchNumbers[p.id] ?? p.number })),
    ];
    return findDuplicateNumbers(entries);
    // eslint-disable-next-line react-hooks/exhaustive-deps
  }, [lineup, bench, benchNumbers]);

  /* ---- Pressinglinie: per Ziehen einstellbar ---- */
  const pitchRef = useRef(null);
  const gameRef = useRef(game);
  gameRef.current = game;
  const [draggingLine, setDraggingLine] = useState(false);

  useEffect(() => {
    if (!draggingLine) return;
    const onMove = (e) => {
      if (!pitchRef.current) return;
      const rect = pitchRef.current.getBoundingClientRect();
      const clientY = e.touches ? e.touches[0].clientY : e.clientY;
      let pct = ((clientY - rect.top) / rect.height) * 100;
      pct = Math.max(4, Math.min(96, pct));
      setGame({ ...gameRef.current, pressingLine: pct });
    };
    const onUp = () => setDraggingLine(false);
    window.addEventListener("pointermove", onMove);
    window.addEventListener("pointerup", onUp);
    window.addEventListener("touchmove", onMove, { passive: false });
    window.addEventListener("touchend", onUp);
    return () => {
      window.removeEventListener("pointermove", onMove);
      window.removeEventListener("pointerup", onUp);
      window.removeEventListener("touchmove", onMove);
      window.removeEventListener("touchend", onUp);
    };
    // eslint-disable-next-line react-hooks/exhaustive-deps
  }, [draggingLine]);

  /* ---- letztes Spiel / Bilanz gegen diesen Gegner ---- */
  const sortedMatches = useMemo(
    () => (matches || []).slice().sort((a, b) => (a.date < b.date ? 1 : -1)),
    [matches]
  );
  const lastMatchOverall = sortedMatches[0] || null;
  const headToHead = useMemo(() => {
    if (!game.opponentName?.trim()) return null;
    const target = game.opponentName.trim().toLowerCase();
    return sortedMatches.find((m) => (m.opponent || "").trim().toLowerCase() === target) || null;
  }, [sortedMatches, game.opponentName]);

  const setBenchNumber = (playerId, value) => {
    setGame({ ...game, benchNumbers: { ...benchNumbers, [playerId]: value } });
  };

  const toggleMatchSquad = (id) => {
    const next = matchSquad.includes(id)
      ? matchSquad.filter((x) => x !== id)
      : [...matchSquad, id];
    // if removed from matchday squad, also remove from lineup
    let nextLineup = lineup;
    if (!next.includes(id)) {
      nextLineup = {};
      for (const [slotId, v] of Object.entries(lineup)) {
        if (v?.playerId !== id) nextLineup[slotId] = v;
      }
    }
    setGame({ ...game, matchSquad: next, lineup: nextLineup });
  };

  const toggleDirectArrival = (id) => {
    const current = game.directArrivalIds || [];
    const next = current.includes(id) ? current.filter((x) => x !== id) : [...current, id];
    setGame({ ...game, directArrivalIds: next });
  };

  const handleAddFocusImage = async (e) => {
    const file = e.target.files?.[0];
    e.target.value = "";
    if (!file) return;
    try {
      const dataUrl = await resizeImageFileFit(file);
      setGame({ ...game, focusImages: [...(game.focusImages || []), { id: uid(), dataUrl, caption: "" }] });
    } catch (err) {
      console.error("Bild konnte nicht verarbeitet werden:", err);
    }
  };

  const removeFocusImage = (id) => {
    setGame({ ...game, focusImages: (game.focusImages || []).filter((i) => i.id !== id) });
  };

  const updateFocusImageCaption = (id, caption) => {
    setGame({ ...game, focusImages: (game.focusImages || []).map((i) => (i.id === id ? { ...i, caption } : i)) });
  };

  const handleOpponentLogoChange = async (e) => {
    const file = e.target.files?.[0];
    e.target.value = "";
    if (!file) return;
    try {
      const dataUrl = await resizeImageFile(file, 300);
      setGame({ ...game, opponentLogo: dataUrl });
    } catch (err) {
      console.error("Wappen konnte nicht verarbeitet werden:", err);
    }
  };

  const removeOpponentLogo = () => setGame({ ...game, opponentLogo: null });

  const setSlotPlayer = (slotId, playerId) => {
    const next = { ...lineup };
    if (playerId === "") {
      delete next[slotId];
    } else {
      // free this player from any other slot
      for (const k of Object.keys(next)) {
        if (next[k]?.playerId === playerId) delete next[k];
      }
      const p = getPlayer(playerId);
      const slotLabel = slots.find((s) => s.id === slotId)?.label || "";
      next[slotId] = { playerId, number: p?.number || "", position: slotLabel || p?.position || "" };
    }
    setGame({ ...game, lineup: next });
  };

  const setSlotField = (slotId, field, value) => {
    const next = { ...lineup };
    if (!next[slotId]) return;
    next[slotId] = { ...next[slotId], [field]: value };
    setGame({ ...game, lineup: next });
  };

  const changeFormation = (formation) => {
    setGame({ ...game, formation, lineup: {} });
  };

  const resetGame = () => {
    if (window.confirm("Neue Spielvorbereitung starten? Die aktuelle Vorbereitung wird in den Verlauf verschoben und bleibt dort abrufbar.")) {
      if (game.opponentName?.trim() || game.date) {
        setGameHistory([...(gameHistory || []), { ...game, id: uid(), archivedAt: Date.now() }]);
      }
      setGame({ ...emptyGame });
    }
  };

  /* ---- Spielplan-Import (fussball.de Copy & Paste) ---- */
  const importSchedule = () => {
    const parsed = parseFussballDeSchedule(pasteText, "haren");
    if (parsed.length === 0) {
      setImportInfo("Keine Spiele erkannt. Bitte den kompletten Spielplan-Bereich der Mannschaftsseite kopieren (inkl. Datum, Uhrzeit und Teamnamen).");
      return;
    }
    const existingKeys = new Set((schedule || []).map((f) => `${f.date}_${f.opponent}`));
    const toAdd = parsed.filter((f) => !existingKeys.has(`${f.date}_${f.opponent}`));
    setSchedule([...(schedule || []), ...toAdd]);
    setImportInfo(`${toAdd.length} Spiel(e) übernommen${parsed.length - toAdd.length > 0 ? `, ${parsed.length - toAdd.length} bereits vorhanden übersprungen` : ""}.`);
    setPasteText("");
  };

  const removeFixture = (id) => setSchedule((schedule || []).filter((f) => f.id !== id));

  const applyFixtureToGame = (fixture) => {
    setGame({
      ...emptyGame,
      date: fixture.date,
      kickoff: fixture.time,
      opponentName: fixture.opponent,
      homeAway: fixture.homeAway,
      matchType: fixture.matchType,
    });
    setSection("vorbereitung");
    removeFixture(fixture.id);
  };

  /* ---- match report helpers ---- */
  const setReport = (patch) => setGame({ ...game, report: { ...report, ...patch } });

  const [goalDraft, setGoalDraft] = useState({ playerId: "", assistId: "", minute: "", scoreUsAfter: "", scoreThemAfter: "" });
  const [cardDraft, setCardDraft] = useState({ playerId: "", type: CARD_TYPES[0], minute: "" });
  const [subDraft, setSubDraft] = useState({ outId: "", inId: "", minute: "" });

  const addGoal = () => {
    if (!goalDraft.playerId) return;
    const p = getPlayer(goalDraft.playerId);
    const a = goalDraft.assistId ? getPlayer(goalDraft.assistId) : null;
    setReport({
      goals: [...report.goals, {
        id: uid(), minute: goalDraft.minute,
        playerId: goalDraft.playerId, playerName: p?.name || "?",
        assistId: goalDraft.assistId || null, assistName: a?.name || "",
        scoreUsAfter: goalDraft.scoreUsAfter, scoreThemAfter: goalDraft.scoreThemAfter,
      }],
    });
    setGoalDraft({ playerId: "", assistId: "", minute: "", scoreUsAfter: "", scoreThemAfter: "" });
  };
  const removeGoal = (id) => setReport({ goals: report.goals.filter((g) => g.id !== id) });

  const addCard = () => {
    if (!cardDraft.playerId) return;
    const p = getPlayer(cardDraft.playerId);
    setReport({
      cards: [...report.cards, {
        id: uid(), minute: cardDraft.minute, type: cardDraft.type,
        playerId: cardDraft.playerId, playerName: p?.name || "?",
      }],
    });
    setCardDraft({ playerId: "", type: CARD_TYPES[0], minute: "" });
  };
  const removeCard = (id) => setReport({ cards: report.cards.filter((c) => c.id !== id) });

  const addSub = () => {
    if (!subDraft.outId || !subDraft.inId) return;
    const out = getPlayer(subDraft.outId);
    const inn = getPlayer(subDraft.inId);
    setReport({
      subs: [...report.subs, {
        id: uid(), minute: subDraft.minute,
        outId: subDraft.outId, outName: out?.name || "?",
        inId: subDraft.inId, inName: inn?.name || "?",
      }],
    });
    setSubDraft({ outId: "", inId: "", minute: "" });
  };
  const removeSub = (id) => setReport({ subs: report.subs.filter((s) => s.id !== id) });

  const onPitchEver = useMemo(() => {
    const ids = new Set(assignedIds);
    report.subs.forEach((s) => ids.add(s.inId));
    return ids;
  }, [assignedIds, report.subs]);

  const unusedPlayers = matchSquad
    .filter((id) => !onPitchEver.has(id))
    .map((id) => getPlayer(id))
    .filter(Boolean);

  const finishReport = () => {
    const duration = Number(report.matchDuration) || 90;

    // Minuten pro Spieler aus Startelf + Wechseln berechnen (einfaches Modell:
    // jeder Spieler kommt höchstens einmal rein/raus, üblich im Amateurbereich).
    const intervals = {};
    assignedIds.forEach((id) => {
      intervals[id] = { start: 0, end: duration };
    });
    report.subs.forEach((s) => {
      const minute = Math.min(duration, Math.max(0, Number(s.minute) || 0));
      if (intervals[s.outId]) intervals[s.outId].end = minute;
      else intervals[s.outId] = { start: 0, end: minute };
      intervals[s.inId] = { start: minute, end: duration };
    });
    const appearances = Object.entries(intervals)
      .map(([id, { start, end }]) => {
        const p = getPlayer(id);
        return { id, name: p?.name || "?", minutes: Math.max(0, end - start) };
      });

    const record = {
      id: uid(),
      date: game.date,
      opponent: game.opponentName,
      matchType: game.matchType,
      scoreUs: report.scoreUs,
      scoreThem: report.scoreThem,
      notes: game.location ? `Ort: ${game.location}` : "",
      formation: game.formation,
      matchDuration: duration,
      goals: report.goals,
      cards: report.cards,
      subs: report.subs,
      appearances,
      unused: unusedPlayers.map((p) => p.name),
    };
    setMatches([...matches, record]);
    window.alert("Spielbericht wurde in die Statistik übernommen.");
  };

  /* ---- team message (WhatsApp) ---- */
  const [copyState, setCopyState] = useState("idle"); // idle | copied | failed

  const teamMessage = useMemo(() => {
    const lineupNumbers = {};
    Object.values(lineup).forEach((entry) => {
      if (entry?.playerId) lineupNumbers[entry.playerId] = entry.number;
    });
    const allNumbers = { ...benchNumbers, ...lineupNumbers };

    const kaderLines = matchSquad
      .map((id) => getPlayer(id))
      .filter(Boolean)
      .sort((a, b) => {
        const na = Number(allNumbers[a.id] ?? a.number) || 99;
        const nb = Number(allNumbers[b.id] ?? b.number) || 99;
        return na - nb;
      })
      .map((p) => `${allNumbers[p.id] ?? p.number ?? "–"} – ${p.name}`)
      .join("\n");

    const lines = [
      `⚽ TuS Haren 2 – Spielankündigung`,
      ``,
      `🗓️ Datum: ${formatDateDE(game.date) || "–"}`,
      `🆚 Gegner: ${game.opponentName || "–"}`,
      `🏆 Spielart: ${game.matchType}`,
      `⏰ Anstoß: ${game.kickoff || "–"} Uhr`,
      `📍 ${game.homeAway === "Heim" ? "Heimspiel" : "Auswärtsspiel"}${game.location ? ` – ${game.location}` : ""}`,
      `🕒 Treffpunkt: ${game.meetingTime || "–"}`,
      `👕 Trikotfarbe: ${game.jerseyColor || "–"}`,
      ``,
      `Kader (Trikotnummer – Name):`,
      kaderLines || "–",
    ];

    if (game.homeAway === "Auswärts" && (game.directArrivalIds || []).length > 0) {
      const directNames = game.directArrivalIds
        .map((id) => getPlayer(id))
        .filter(Boolean)
        .map((p) => p.name)
        .join(", ");
      if (directNames) {
        lines.push(``, `🚗 Fährt direkt zum Spielort: ${directNames}`);
      }
    }

    return lines.join("\n");
  }, [game, matchSquad, lineup, squad]);

  const resultMessage = useMemo(() => {
    const startersLines = Object.values(lineup)
      .filter((e) => e?.playerId)
      .map((e) => {
        const p = getPlayer(e.playerId);
        if (!p) return null;
        return `${e.number || p.number || "–"} ${e.position || ""} – ${p.name}`.replace(/\s+/g, " ").trim();
      })
      .filter(Boolean)
      .join("\n");

    const goalsLines = report.goals
      .map((g) => {
        const scoreNote = g.scoreUsAfter !== "" && g.scoreThemAfter !== "" && g.scoreUsAfter != null && g.scoreThemAfter != null
          ? ` – Tor zum ${g.scoreUsAfter}:${g.scoreThemAfter}`
          : "";
        return `${g.minute ? `${g.minute}' ` : ""}${g.playerName}${g.assistName ? ` (Vorlage: ${g.assistName})` : ""}${scoreNote}`;
      })
      .join("\n");

    const subsLines = report.subs
      .map((s) => `${s.minute ? `${s.minute}' ` : ""}${s.outName} raus, ${s.inName} rein`)
      .join("\n");

    const cardsLines = report.cards
      .map((c) => `${c.minute ? `${c.minute}' ` : ""}${c.playerName} – ${c.type}`)
      .join("\n");

    const lines = [
      `⚽ TuS Haren 2 – Ergebnisdienst`,
      ``,
      `🗓️ Datum: ${formatDateDE(game.date) || "–"}`,
      `🆚 Gegner: ${game.opponentName || "–"}`,
      `🏆 Spielart: ${game.matchType}`,
      `📊 Endstand: ${report.scoreUs || "0"} : ${report.scoreThem || "0"}`,
    ];

    if (goalsLines) lines.push(``, `⚽ Torschützen:`, goalsLines);
    if (subsLines) lines.push(``, `🔄 Wechsel:`, subsLines);
    if (cardsLines) lines.push(``, `🟨🟥 Karten:`, cardsLines);
    if (startersLines) lines.push(``, `Aufstellung:`, startersLines);

    return lines.join("\n");
  }, [game, report, lineup, squad]);

  const handleCopyText = async (text) => {
    const ok = await copyToClipboard(text);
    setCopyState(ok ? "copied" : "failed");
    setTimeout(() => setCopyState("idle"), 2500);
  };

  const handleCopy = () => handleCopyText(teamMessage);
  const handleCopyResult = () => handleCopyText(resultMessage);

  if (viewingHistory) {
    return <PresentationView squad={squad} game={viewingHistory} onExit={() => setViewingHistory(null)} />;
  }

  return (
    <div className="max-w-5xl mx-auto">
      <div className="flex items-center justify-between mb-4 flex-wrap gap-2">
        <h2 className="text-[var(--text-primary)] text-xl" style={{ fontFamily: "'Oswald', sans-serif" }}>
          AKTUELLES SPIEL
        </h2>
        <button onClick={resetGame} className="text-xs text-[var(--text-secondary)] hover:text-[#ff8a8a] underline">
          Neue Spielvorbereitung starten
        </button>
      </div>

      <div className="flex gap-2 mb-5">
        {[
          ["spielplan", "Spielplan"],
          ["vorbereitung", "Vorbereitung"],
          ["nachricht", "Team-Nachricht"],
          ["spielbericht", "Spielbericht"],
          ["ergebnisdienst", "Ergebnisdienst"],
          ["verlauf", "Verlauf"],
        ].map(([id, label]) => (
          <button
            key={id}
            onClick={() => setSection(id)}
            className={
              "text-sm font-semibold px-4 py-1.5 rounded-full border transition-colors " +
              (section === id
                ? "bg-[#c8102e] border-[#c8102e] text-white"
                : "border-[var(--border-card)] text-[var(--text-secondary)] hover:text-[var(--text-body)]")
            }
          >
            {label}
          </button>
        ))}
      </div>

      {section === "spielplan" && (
        <div className="max-w-2xl">
          <div className="bg-[var(--bg-card)] border border-[var(--border-card)] rounded-lg p-4 mb-5">
            <h3 className="text-[var(--text-primary)] text-sm font-semibold mb-1">Spielplan von fussball.de importieren</h3>
            <p className="text-[var(--text-tertiary)] text-[11px] mb-3">
              Auf eurer Mannschaftsseite bei fussball.de den Bereich „Mannschaftsspielplan" markieren (von der ersten
              bis zur letzten Zeile mit Datum/Gegner), kopieren (Strg+C / Cmd+C) und hier einfügen. Es gibt bei
              fussball.de keine offizielle Exportfunktion – dieser Import erkennt Datum, Uhrzeit, Gegner und
              Heim/Auswärts automatisch aus dem eingefügten Text.
            </p>
            <textarea
              className={inputCls + " font-mono text-xs"}
              rows={6}
              placeholder="Spielplan-Text hier einfügen …"
              value={pasteText}
              onChange={(e) => setPasteText(e.target.value)}
            />
            <button
              onClick={importSchedule}
              className="mt-3 flex items-center gap-1.5 bg-[#c8102e] hover:bg-[#a80d26] text-white text-sm font-semibold px-4 py-2 rounded-md"
            >
              <Plus size={15} /> Spielplan einlesen
            </button>
            {importInfo && <p className="text-[var(--text-secondary)] text-xs mt-2">{importInfo}</p>}
          </div>

          {(schedule || []).length === 0 ? (
            <p className="text-[var(--text-tertiary)] text-sm">Noch keine importierten Spiele.</p>
          ) : (
            <div className="space-y-1.5">
              {(schedule || [])
                .slice()
                .sort((a, b) => (a.date < b.date ? -1 : 1))
                .map((f) => (
                  <div key={f.id} className="flex items-center gap-3 bg-[var(--bg-card)] border border-[var(--border-card)] rounded-lg px-3 py-2">
                    <div className="w-24 text-xs text-[var(--text-secondary)] shrink-0">{formatDateDE(f.date)}</div>
                    <div className="w-14 text-xs text-[var(--text-secondary)] shrink-0">{f.time || "–"}</div>
                    <span
                      className="text-[10px] font-semibold px-2 py-0.5 rounded-full shrink-0"
                      style={{ background: (MATCH_TYPE_COLORS[f.matchType] || "#7a93a8") + "33", color: MATCH_TYPE_COLORS[f.matchType] || "#7a93a8" }}
                    >
                      {f.matchType}
                    </span>
                    <div className="flex-1 text-sm text-[var(--text-primary)] truncate">
                      {f.opponent} <span className="text-[var(--text-tertiary)] text-xs">({f.homeAway})</span>
                    </div>
                    <button
                      onClick={() => applyFixtureToGame(f)}
                      className="text-xs font-semibold text-[var(--text-primary)] bg-[var(--border-card)] hover:bg-[#2f5643] px-3 py-1.5 rounded-md shrink-0"
                    >
                      Übernehmen
                    </button>
                    <button onClick={() => removeFixture(f.id)} className="text-[var(--text-tertiary)] hover:text-[#ff8a8a] shrink-0">
                      <Trash2 size={15} />
                    </button>
                  </div>
                ))}
            </div>
          )}
        </div>
      )}

      {section === "vorbereitung" && (
        <div className="grid lg:grid-cols-5 gap-6">
          {/* Pitch */}
          <div className="lg:col-span-3">
            <div className="flex items-center gap-3 mb-3 flex-wrap">
              <span className="text-[11px] uppercase tracking-wide text-[var(--text-secondary)] font-semibold">
                System
              </span>
              <select
                className={inputCls + " w-40"}
                value={game.formation}
                onChange={(e) => changeFormation(e.target.value)}
              >
                {Object.keys(FORMATIONS).map((f) => (
                  <option key={f}>{f}</option>
                ))}
              </select>
              <span className="text-[11px] uppercase tracking-wide text-[var(--text-secondary)] font-semibold ml-2">
                Spieltyp
              </span>
              <div className="flex gap-1.5">
                {MATCH_TYPES.map((t) => (
                  <button
                    key={t}
                    onClick={() => setGame({ ...game, matchType: t })}
                    className={
                      "text-xs font-semibold px-2.5 py-1 rounded-full border " +
                      (game.matchType === t ? "text-white" : "text-[var(--text-secondary)] border-[var(--border-card)]")
                    }
                    style={game.matchType === t ? { background: MATCH_TYPE_COLORS[t], borderColor: MATCH_TYPE_COLORS[t] } : {}}
                  >
                    {t}
                  </button>
                ))}
              </div>
            </div>

            {matchSquad.length === 0 && (
              <p className="text-[var(--text-tertiary)] text-xs mb-2">
                Wählt zuerst rechts den Kader für diesen Spieltag – erst dann könnt ihr Spieler auf das Feld stellen.
              </p>
            )}

            <div
              ref={pitchRef}
              className="relative w-full rounded-lg border-2 border-[#e8e6df]/30 overflow-hidden"
              style={{
                aspectRatio: "0.68",
                background:
                  "repeating-linear-gradient(to bottom, #1c5238 0, #1c5238 11.11%, #1a4a32 11.11%, #1a4a32 22.22%)",
                touchAction: draggingLine ? "none" : "auto",
              }}
            >
              <div className="absolute inset-3 border border-white/25 rounded-sm pointer-events-none" />
              <div className="absolute top-1/2 left-3 right-3 h-px bg-white/25 -translate-y-1/2 pointer-events-none" />
              <div className="absolute left-1/2 top-1/2 w-24 h-24 border border-white/25 rounded-full -translate-x-1/2 -translate-y-1/2 pointer-events-none" />
              <div className="absolute left-1/2 bottom-3 w-2/5 h-[14%] border border-white/25 border-b-0 -translate-x-1/2 pointer-events-none" />
              <div className="absolute left-1/2 top-3 w-2/5 h-[14%] border border-white/25 border-t-0 -translate-x-1/2 pointer-events-none" />

              {/* Pressinglinie */}
              <div
                className="absolute left-0 right-0 border-t-2 border-dashed"
                style={{ top: `${pressingLine}%`, borderColor: "#ffd54a" }}
              >
                <div
                  onPointerDown={() => setDraggingLine(true)}
                  onTouchStart={() => setDraggingLine(true)}
                  className="absolute left-2 -translate-y-1/2 text-[9px] font-bold px-1.5 py-0.5 rounded-full cursor-ns-resize select-none shadow"
                  style={{ background: "#ffd54a", color: "#122e23", touchAction: "none" }}
                  title="Ziehen, um die Pressinglinie zu verschieben"
                >
                  Pressing
                </div>
              </div>

              {slots.map((slot) => {
                const entry = lineup[slot.id];
                const options = squad.filter((p) => matchSquad.includes(p.id));
                return (
                  <div
                    key={slot.id}
                    className="absolute -translate-x-1/2 -translate-y-1/2 flex flex-col items-center gap-0.5"
                    style={{ left: `${slot.x}%`, top: `${slot.y}%` }}
                  >
                    <select
                      className="w-[100px] sm:w-[118px] text-[10px] text-center bg-white/95 border border-[#c8102e] rounded-full px-1 py-1 font-semibold text-[#122e23] shadow truncate"
                      value={entry?.playerId || ""}
                      onChange={(e) => setSlotPlayer(slot.id, e.target.value)}
                    >
                      <option value="" style={{ color: "#122e23", backgroundColor: "#ffffff" }}>{slot.label}</option>
                      {options.map((p) => (
                        <option key={p.id} value={p.id} style={{ color: "#122e23", backgroundColor: "#ffffff" }}>
                          {p.number ? `#${p.number} ` : ""}
                          {shortName(p.name)}
                        </option>
                      ))}
                    </select>
                    {entry && (
                      <div className="flex gap-0.5">
                        <input
                          className={
                            "w-8 text-[10px] text-center border rounded px-0.5 py-0.5" +
                            (duplicateNumberIds.has(entry.playerId)
                              ? " bg-[#e08a2e]/20 border-[#e08a2e] text-[#e08a2e] font-bold"
                              : " bg-[var(--bg-input)]/90 border-[var(--border-input)] text-[var(--text-body)]")
                          }
                          value={entry.number}
                          onChange={(e) => setSlotField(slot.id, "number", e.target.value)}
                          placeholder="Nr"
                          title={duplicateNumberIds.has(entry.playerId) ? "Doppelt vergebene Rückennummer!" : undefined}
                        />
                        <input
                          className="w-12 text-[10px] text-center bg-[var(--bg-input)]/90 border border-[var(--border-input)] rounded text-[var(--text-body)] px-0.5 py-0.5"
                          value={entry.position}
                          onChange={(e) => setSlotField(slot.id, "position", e.target.value)}
                          placeholder="Pos"
                        />
                      </div>
                    )}
                  </div>
                );
              })}
            </div>

            <p className="text-[var(--text-tertiary)] text-[11px] mt-1.5">
              Die gelbe „Pressing"-Linie könnt ihr auf dem Feld nach oben oder unten ziehen.
            </p>

            {bench.length > 0 && (
              <div className="mt-3">
                <p className="text-[11px] uppercase tracking-wide text-[var(--text-secondary)] font-semibold mb-1.5">
                  Bank (im Kader, nicht in der Startelf)
                </p>
                <div className="flex flex-wrap gap-1.5">
                  {bench.map((p) => (
                    <span
                      key={p.id}
                      className={
                        "flex items-center gap-1 text-xs border pl-1 pr-2 py-1 rounded-full" +
                        (duplicateNumberIds.has(p.id)
                          ? " bg-[#e08a2e]/20 border-[#e08a2e] text-[#e08a2e]"
                          : " bg-[var(--bg-card)] border-[var(--border-card)] text-[var(--text-secondary)]")
                      }
                      title={duplicateNumberIds.has(p.id) ? "Doppelt vergebene Rückennummer!" : undefined}
                    >
                      <span>#</span>
                      <input
                        className={
                          "w-7 rounded text-center py-0.5 border" +
                          (duplicateNumberIds.has(p.id)
                            ? " bg-[#e08a2e]/20 border-[#e08a2e] text-[#e08a2e] font-bold"
                            : " bg-[var(--bg-input)] border-[var(--border-input)] text-[var(--text-body)]")
                        }
                        value={benchNumbers[p.id] ?? p.number ?? ""}
                        onChange={(e) => setBenchNumber(p.id, e.target.value)}
                      />
                      <span>{p.name}</span>
                    </span>
                  ))}
                </div>
              </div>
            )}
          </div>

          {/* Info panels */}
          <div className="lg:col-span-2 space-y-4">
            {(lastMatchOverall || headToHead) && (
              <div className="bg-[var(--bg-card)] border border-[var(--border-card)] rounded-lg p-4">
                <h3 className="text-[var(--text-primary)] text-sm font-semibold mb-3 flex items-center gap-2">
                  <BarChart3 size={15} className="text-[#c8102e]" /> Letztes Spiel &amp; Bilanz
                </h3>
                {lastMatchOverall && (
                  <div className="flex items-center gap-2 text-sm mb-1.5">
                    <span className="text-[var(--text-tertiary)] text-xs w-24 shrink-0">Letztes Spiel</span>
                    <span className="text-[var(--text-primary)] font-semibold tabular-nums">
                      {lastMatchOverall.scoreUs}:{lastMatchOverall.scoreThem}
                    </span>
                    <span className="text-[var(--text-secondary)] truncate">gegen {lastMatchOverall.opponent}</span>
                    <span className="text-[var(--text-tertiary)] text-xs ml-auto shrink-0">{formatDateDE(lastMatchOverall.date)}</span>
                  </div>
                )}
                {headToHead && (
                  <div className="flex items-center gap-2 text-sm">
                    <span className="text-[var(--text-tertiary)] text-xs w-24 shrink-0">Gegen {game.opponentName}</span>
                    <span className="text-[var(--text-primary)] font-semibold tabular-nums">
                      {headToHead.scoreUs}:{headToHead.scoreThem}
                    </span>
                    <span className="text-[var(--text-tertiary)] text-xs ml-auto shrink-0">{formatDateDE(headToHead.date)}</span>
                  </div>
                )}
              </div>
            )}

            <div className="bg-[var(--bg-card)] border border-[var(--border-card)] rounded-lg p-4">
              <h3 className="text-[var(--text-primary)] text-sm font-semibold mb-3 flex items-center gap-2">
                <Shield size={15} className="text-[#c8102e]" /> Rahmendaten
              </h3>
              <Field label="Gegner">
                <input className={inputCls} value={game.opponentName} onChange={(e) => setGame({ ...game, opponentName: e.target.value })} />
              </Field>
              <div className="grid grid-cols-2 gap-3">
                <Field label="Datum">
                  <input type="date" className={inputCls} value={game.date} onChange={(e) => setGame({ ...game, date: e.target.value })} />
                </Field>
                <Field label="Anstoß">
                  <input type="time" className={inputCls} value={game.kickoff} onChange={(e) => setGame({ ...game, kickoff: e.target.value })} />
                </Field>
              </div>
              <Field label="Ort / Anfahrt">
                <input className={inputCls} value={game.location} onChange={(e) => setGame({ ...game, location: e.target.value })} />
              </Field>
              <div className="grid grid-cols-2 gap-3">
                <Field label="Treffpunkt / -zeit">
                  <input className={inputCls} placeholder='z.B. 12:30 Uhr Sportheim' value={game.meetingTime} onChange={(e) => setGame({ ...game, meetingTime: e.target.value })} />
                </Field>
                <Field label="Heim / Auswärts">
                  <div className="flex gap-1.5 pt-1">
                    {["Heim", "Auswärts"].map((h) => (
                      <button
                        key={h}
                        onClick={() => setGame({ ...game, homeAway: h })}
                        className={
                          "flex-1 text-xs font-semibold px-2 py-2 rounded-md border " +
                          (game.homeAway === h ? "bg-[#c8102e] border-[#c8102e] text-white" : "border-[var(--border-input)] text-[var(--text-secondary)]")
                        }
                      >

          </p>
          {(gameHistory || []).length === 0 ? (
            <p className="text-[var(--text-tertiary)] text-sm">Noch keine archivierten Vorbereitungen.</p>
          ) : (
            <div className="space-y-1.5">
              {(gameHistory || [])
                .slice()
                .sort((a, b) => (b.archivedAt || 0) - (a.archivedAt || 0))
                .map((g) => (
                  <div key={g.id} className="flex items-center gap-3 bg-[var(--bg-card)] border border-[var(--border-card)] rounded-lg px-3 py-2">
                    <div className="w-24 text-xs text-[var(--text-secondary)] shrink-0">{formatDateDE(g.date) || "–"}</div>
                    <span
                      className="text-[10px] font-semibold px-2 py-0.5 rounded-full shrink-0"
                      style={{ background: (MATCH_TYPE_COLORS[g.matchType] || "#7a93a8") + "33", color: MATCH_TYPE_COLORS[g.matchType] || "#7a93a8" }}
                    >
                      {g.matchType}
                    </span>
                    <div className="flex-1 text-sm text-[var(--text-primary)] truncate">{g.opponentName || "Ohne Gegner"}</div>
                    {g.report?.scoreUs !== "" && g.report?.scoreThem !== "" && g.report?.scoreUs != null && g.report?.scoreThem != null && (
                      <div className="text-sm font-bold text-[var(--text-primary)] tabular-nums shrink-0">
                        {g.report.scoreUs}:{g.report.scoreThem}
                      </div>
                    )}
                    <button
                      onClick={() => setViewingHistory(g)}
                      className="text-xs font-semibold text-white bg-[#254536] hover:bg-[#2f5643] px-3 py-1.5 rounded-md shrink-0"
                    >
                      Anzeigen
                    </button>
                    <button
                      onClick={() => setGameHistory((gameHistory || []).filter((x) => x.id !== g.id))}
                      className="text-[var(--text-tertiary)] hover:text-[#ff8a8a] shrink-0"
                    >
                      <Trash2 size={15} />
                    </button>
                  </div>
                ))}
            </div>
          )}
        </div>
      )}
    </div>
  );
}

function FormChart({ matches }) {
  const data = (matches || [])
    .filter((m) => m.scoreUs !== "" && m.scoreThem !== "" && m.scoreUs != null && m.scoreThem != null)
    .slice()
    .sort((a, b) => (a.date < b.date ? -1 : 1))
    .map((m) => ({ date: m.date, opponent: m.opponent, gf: Number(m.scoreUs), ga: Number(m.scoreThem) }));

  if (data.length < 2) return null;

  const w = 640;
  const h = 200;
  const pad = 30;
  const maxY = Math.max(1, ...data.map((d) => Math.max(d.gf, d.ga)));
  const stepX = data.length > 1 ? (w - pad * 2) / (data.length - 1) : 0;
  const scaleX = (i) => pad + i * stepX;
  const scaleY = (v) => h - pad - (v / maxY) * (h - pad * 2);
  const linePath = (key) => data.map((d, i) => `${i === 0 ? "M" : "L"} ${scaleX(i)} ${scaleY(d[key])}`).join(" ");

  return (
    <div className="bg-[var(--bg-card)] border border-[var(--border-card)] rounded-lg p-4 mb-6">
      <div className="flex items-center justify-between mb-3">
        <h3 className="text-[var(--text-primary)] text-sm font-semibold">Formkurve</h3>
        <div className="flex items-center gap-3 text-[10px] text-[var(--text-secondary)]">
          <span className="flex items-center gap-1">
            <span className="w-2.5 h-2.5 rounded-full inline-block" style={{ background: "#3fae6b" }} /> Tore
          </span>
          <span className="flex items-center gap-1">
            <span className="w-2.5 h-2.5 rounded-full inline-block" style={{ background: "#c8102e" }} /> Gegentore
          </span>
        </div>
      </div>
      <svg viewBox={`0 0 ${w} ${h}`} className="w-full h-40">
        {[0, 1, 2, 3].map((i) => (
          <line
            key={i}
            x1={pad}
            x2={w - pad}
            y1={pad + (i * (h - pad * 2)) / 3}
            y2={pad + (i * (h - pad * 2)) / 3}
            stroke="var(--border-card)"
            strokeWidth="1"
          />
        ))}
        <path d={linePath("gf")} fill="none" stroke="#3fae6b" strokeWidth="2.5" />
        <path d={linePath("ga")} fill="none" stroke="#c8102e" strokeWidth="2.5" />
        {data.map((d, i) => (
          <g key={i}>
            <circle cx={scaleX(i)} cy={scaleY(d.gf)} r="3.5" fill="#3fae6b" />
            <circle cx={scaleX(i)} cy={scaleY(d.ga)} r="3.5" fill="#c8102e" />
            <title>{`${formatDateDE(d.date)} vs ${d.opponent}: ${d.gf}:${d.ga}`}</title>
          </g>
        ))}
      </svg>
    </div>
  );
}

function StatsTab({ matches, setMatches }) {
  const [view, setView] = useState("spiele"); // "spiele" | "spieler"
  const [draft, setDraft] = useState({
    date: "",
    opponent: "",
    matchType: "Liga",
    scoreUs: "",
    scoreThem: "",
    notes: "",
  });
  const [filter, setFilter] = useState("Alle");
  const [expanded, setExpanded] = useState({});

  const addMatch = () => {
    if (!draft.opponent.trim() || draft.scoreUs === "" || draft.scoreThem === "") return;
    setMatches([...matches, { id: uid(), ...draft, goals: [], cards: [], subs: [], appearances: [], unused: [] }]);
    setDraft({ date: "", opponent: "", matchType: "Liga", scoreUs: "", scoreThem: "", notes: "" });
  };

  const removeMatch = (id) => setMatches(matches.filter((m) => m.id !== id));
  const toggleExpand = (id) => setExpanded((e) => ({ ...e, [id]: !e[id] }));

  const filtered = filter === "Alle" ? matches : matches.filter((m) => (m.matchType || "Liga") === filter);

  const playerStats = useMemo(() => {
    const stats = {};
    const ensure = (key, name) => {
      if (!stats[key]) {
        stats[key] = { name, apps: 0, minutes: 0, goals: 0, assists: 0, yellow: 0, yellowRed: 0, red: 0 };
      }
      return stats[key];
    };
    filtered.forEach((m) => {
      const involved = new Set();
      (m.appearances || []).forEach((a) => {
        const key = a.id || a.name;
        const s = ensure(key, a.name);
        s.apps += 1;
        s.minutes += Number(a.minutes) || 0;
        involved.add(key);
      });
      (m.goals || []).forEach((g) => {
        const key = g.playerId || g.playerName;
        const s = ensure(key, g.playerName);
        s.goals += 1;
        if (!involved.has(key)) {
          s.apps += 1;
          involved.add(key);
        }
        if (g.assistId || g.assistName) {
          const akey = g.assistId || g.assistName;
          const as = ensure(akey, g.assistName);
          as.assists += 1;
          if (!involved.has(akey)) {
            as.apps += 1;
            involved.add(akey);
          }
        }
      });
      (m.cards || []).forEach((c) => {
        const key = c.playerId || c.playerName;
        const s = ensure(key, c.playerName);
        if (c.type === "Gelb") s.yellow += 1;
        else if (c.type === "Gelb-Rot") s.yellowRed += 1;
        else if (c.type === "Rot") s.red += 1;
        if (!involved.has(key)) {
          s.apps += 1;
          involved.add(key);
        }
      });
      (m.subs || []).forEach((sub) => {
        [
          [sub.inId, sub.inName],
          [sub.outId, sub.outName],
        ].forEach(([pid, pname]) => {
          if (pid && !involved.has(pid)) {
            const s = ensure(pid, pname);
            s.apps += 1;
            involved.add(pid);
          }
        });
      });
    });
    return Object.values(stats).sort((a, b) => b.goals - a.goals || b.apps - a.apps);
  }, [filtered]);

  const summary = useMemo(() => {
    let w = 0, d = 0, l = 0, gf = 0, ga = 0;
    filtered.forEach((m) => {
      const us = Number(m.scoreUs), them = Number(m.scoreThem);
      gf += us;
      ga += them;
      if (us > them) w++;
      else if (us === them) d++;
      else l++;
    });
    return { w, d, l, gf, ga, diff: gf - ga };
  }, [filtered]);

  const sorted = filtered.slice().sort((a, b) => (a.date < b.date ? 1 : -1));

  return (
    <div className="max-w-3xl mx-auto">
      <h2 className="text-[var(--text-primary)] text-xl mb-4" style={{ fontFamily: "'Oswald', sans-serif" }}>
        STATISTIK
      </h2>

      <div className="flex gap-2 mb-5">
        {[
          ["spiele", "Spiele"],
          ["spieler", "Spieler"],
        ].map(([id, label]) => (
          <button
            key={id}
            onClick={() => setView(id)}
            className={
              "text-sm font-semibold px-4 py-1.5 rounded-full border transition-colors " +
              (view === id ? "bg-[#c8102e] border-[#c8102e] text-white" : "border-[var(--border-card)] text-[var(--text-secondary)] hover:text-[var(--text-body)]")
            }
          >
            {label}
          </button>
        ))}
      </div>

      {view === "spieler" && (
        <div>
          <p className="text-[var(--text-tertiary)] text-xs mb-4">
            Automatisch aus den Spielberichten zusammengezählt (Spielminuten aus Startelf + Auswechslungen berechnet).
            Über „Spiel manuell eintragen" hinzugefügte Ergebnisse ohne Spielbericht fließen hier nicht ein.
          </p>
          {playerStats.length === 0 ? (
            <p className="text-[var(--text-tertiary)] text-sm">Noch keine Spielerdaten – erst einen Spielbericht abschließen.</p>
          ) : (
            <div className="overflow-x-auto">
              <table className="w-full text-sm">
                <thead>
                  <tr className="text-left text-[10px] uppercase tracking-wide text-[var(--text-secondary)] border-b border-[var(--border-card)]">
                    <th className="py-2 pr-2">Spieler</th>
                    <th className="py-2 px-2 text-center">Sp.</th>
                    <th className="py-2 px-2 text-center">Min.</th>
                    <th className="py-2 px-2 text-center">Tore</th>
                    <th className="py-2 px-2 text-center">Vorl.</th>
                    <th className="py-2 px-2 text-center">🟨</th>
                    <th className="py-2 px-2 text-center">🟨🟥</th>
                    <th className="py-2 px-2 text-center">🟥</th>
                  </tr>
                </thead>
                <tbody>
                  {playerStats.map((p, i) => (
                    <tr key={i} className="border-b border-[#1c3a2c] text-[var(--text-body)]">
                      <td className="py-2 pr-2">{p.name}</td>
                      <td className="py-2 px-2 text-center tabular-nums">{p.apps}</td>
                      <td className="py-2 px-2 text-center tabular-nums">{p.minutes}</td>
                      <td className="py-2 px-2 text-center tabular-nums font-semibold text-[var(--text-primary)]">{p.goals}</td>
                      <td className="py-2 px-2 text-center tabular-nums">{p.assists}</td>
                      <td className="py-2 px-2 text-center tabular-nums">{p.yellow}</td>
                      <td className="py-2 px-2 text-center tabular-nums">{p.yellowRed}</td>
                      <td className="py-2 px-2 text-center tabular-nums">{p.red}</td>
                    </tr>
                  ))}
                </tbody>
              </table>
            </div>
          )}
        </div>
      )}

      {view === "spiele" && (
        <>
      <div className="flex gap-1.5 mb-4">
        {["Alle", ...MATCH_TYPES].map((t) => (
          <button
            key={t}
            onClick={() => setFilter(t)}
            className={
              "text-xs font-semibold px-3 py-1.5 rounded-full border " +
              (filter === t ? "bg-[#c8102e] border-[#c8102e] text-white" : "border-[var(--border-card)] text-[var(--text-secondary)] hover:text-[var(--text-body)]")
            }
          >
            {t}
          </button>
        ))}
      </div>

      <div className="grid grid-cols-3 sm:grid-cols-6 gap-2 mb-6">
        {[
          ["Siege", summary.w, "#3fae6b"],
          ["Unent.", summary.d, "#c8a13f"],
          ["Nied.", summary.l, "#c8102e"],
          ["Tore", summary.gf, "#e8e6df"],
          ["Gegentore", summary.ga, "#e8e6df"],
          ["Diff.", (summary.diff > 0 ? "+" : "") + summary.diff, "#e8e6df"],
        ].map(([label, val, color]) => (
          <div key={label} className="bg-[var(--bg-card)] border border-[var(--border-card)] rounded-lg py-3 text-center">
            <div className="text-xl font-bold" style={{ color, fontFamily: "'Oswald', sans-serif" }}>
              {val}
            </div>
            <div className="text-[10px] uppercase tracking-wide text-[var(--text-secondary)] mt-0.5">{label}</div>
          </div>
        ))}
      </div>

      <FormChart matches={filtered} />

      <div className="bg-[var(--bg-card)] border border-[var(--border-card)] rounded-lg p-4 mb-6">
        <h3 className="text-[var(--text-primary)] text-sm font-semibold mb-3">Spiel manuell eintragen</h3>
        <div className="grid grid-cols-2 sm:grid-cols-6 gap-3 mb-3">
          <input type="date" className={inputCls} value={draft.date} onChange={(e) => setDraft({ ...draft, date: e.target.value })} />
          <input className={inputCls + " sm:col-span-2"} placeholder="Gegner" value={draft.opponent} onChange={(e) => setDraft({ ...draft, opponent: e.target.value })} />
          <select className={inputCls} value={draft.matchType} onChange={(e) => setDraft({ ...draft, matchType: e.target.value })}>
            {MATCH_TYPES.map((t) => <option key={t}>{t}</option>)}
          </select>
          <input className={inputCls} placeholder="Tore wir" inputMode="numeric" value={draft.scoreUs} onChange={(e) => setDraft({ ...draft, scoreUs: e.target.value.replace(/\D/, "") })} />
          <input className={inputCls} placeholder="Tore Gegner" inputMode="numeric" value={draft.scoreThem} onChange={(e) => setDraft({ ...draft, scoreThem: e.target.value.replace(/\D/, "") })} />
        </div>
        <input className={inputCls + " mb-3"} placeholder="Notiz (optional)" value={draft.notes} onChange={(e) => setDraft({ ...draft, notes: e.target.value })} />
        <button onClick={addMatch} className="flex items-center gap-1.5 bg-[#c8102e] hover:bg-[#a80d26] text-white text-sm font-semibold px-4 py-2 rounded-md">
          <Plus size={15} /> Ergebnis speichern
        </button>
        <p className="text-[var(--text-tertiary)] text-[11px] mt-2">
          Ausführliche Spielberichte (Torschützen, Karten, Wechsel) trägt ihr am besten direkt im Tab „Aktuelles Spiel" unter „Spielbericht" ein.
        </p>
      </div>

      {sorted.length === 0 ? (
        <p className="text-[var(--text-tertiary)] text-sm">Noch keine Spiele erfasst.</p>
      ) : (
        <div className="space-y-1.5">
          {sorted.map((m) => {
            const us = Number(m.scoreUs), them = Number(m.scoreThem);
            const outcome = us > them ? "#3fae6b" : us === them ? "#c8a13f" : "#c8102e";
            const hasDetails = (m.goals?.length || m.cards?.length || m.subs?.length || m.unused?.length);
            const isOpen = expanded[m.id];
            return (
              <div key={m.id} className="bg-[var(--bg-card)] border border-[var(--border-card)] rounded-lg overflow-hidden">
                <div className="flex items-center gap-3 px-3 py-2">
                  <div className="w-1.5 h-8 rounded-full shrink-0" style={{ background: outcome }} />
                  <div className="w-20 text-xs text-[var(--text-secondary)] shrink-0">{m.date || "–"}</div>
                  <span
                    className="hidden sm:inline-block text-[10px] font-semibold px-2 py-0.5 rounded-full shrink-0"
                    style={{ background: (MATCH_TYPE_COLORS[m.matchType] || "#7a93a8") + "33", color: MATCH_TYPE_COLORS[m.matchType] || "#7a93a8" }}
                  >
                    {m.matchType || "Liga"}
                  </span>
                  <div className="flex-1 text-sm text-[var(--text-primary)] truncate">{m.opponent}</div>
                  <div className="text-sm font-bold text-[var(--text-primary)] tabular-nums">{m.scoreUs} : {m.scoreThem}</div>
                  {hasDetails ? (
                    <button onClick={() => toggleExpand(m.id)} className="text-[var(--text-secondary)] hover:text-[var(--text-primary)] shrink-0">
                      <ChevronRight size={16} className={"transition-transform " + (isOpen ? "rotate-90" : "")} />
                    </button>
                  ) : <span className="w-4 shrink-0" />}
                  <button onClick={() => removeMatch(m.id)} className="text-[var(--text-tertiary)] hover:text-[#ff8a8a] shrink-0">
                    <Trash2 size={15} />
                  </button>
                </div>
                {isOpen && (
                  <div className="border-t border-[var(--border-card)] px-4 py-3 text-xs text-[var(--text-secondary)] space-y-2">
                    {m.notes && <p className="text-[var(--text-secondary)]">{m.notes}</p>}
                    {m.goals?.length > 0 && (
                      <div>
                        <p className="text-[var(--text-tertiary)] uppercase tracking-wide text-[10px] mb-1">Tore</p>
                        {m.goals.map((g) => (
                          <p key={g.id}>
                            {g.minute ? `${g.minute}' ` : ""}⚽ {g.playerName}{g.assistName ? ` (Vorlage: ${g.assistName})` : ""}
                            {g.scoreUsAfter !== "" && g.scoreThemAfter !== "" && g.scoreUsAfter != null && g.scoreThemAfter != null
                              ? ` – Tor zum ${g.scoreUsAfter}:${g.scoreThemAfter}`
                              : ""}
                          </p>
                        ))}
                      </div>
                    )}
                    {m.cards?.length > 0 && (
                      <div>
                        <p className="text-[var(--text-tertiary)] uppercase tracking-wide text-[10px] mb-1">Karten</p>
                        {m.cards.map((c) => (
                          <p key={c.id}>{c.minute ? `${c.minute}' ` : ""}{c.playerName} — {c.type}</p>
                        ))}
                      </div>
                    )}
                    {m.subs?.length > 0 && (
                      <div>
                        <p className="text-[var(--text-tertiary)] uppercase tracking-wide text-[10px] mb-1">Wechsel</p>
                        {m.subs.map((s) => (
                          <p key={s.id}>{s.minute ? `${s.minute}' ` : ""}⇄ {s.outName} raus, {s.inName} rein</p>
                        ))}
                      </div>
                    )}
                    {m.unused?.length > 0 && (
                      <div>
                        <p className="text-[var(--text-tertiary)] uppercase tracking-wide text-[10px] mb-1">Im Kader, nicht eingesetzt</p>
                        <p>{m.unused.join(", ")}</p>
                      </div>
                    )}
                  </div>
                )}
              </div>
            );
          })}
        </div>
      )}
        </>
      )}
    </div>
  );
}

function InfoTab({ creds, setCreds }) {
  const [draft, setDraft] = useState({ service: "", username: "", password: "", notes: "" });
  const [visible, setVisible] = useState({});

  const add = () => {
    if (!draft.service.trim()) return;
    setCreds([...creds, { id: uid(), ...draft }]);
    setDraft({ service: "", username: "", password: "", notes: "" });
  };

  const remove = (id) => setCreds(creds.filter((c) => c.id !== id));
  const update = (id, field, value) => setCreds(creds.map((c) => (c.id === id ? { ...c, [field]: value } : c)));
  const toggle = (id) => setVisible((v) => ({ ...v, [id]: !v[id] }));

  return (
    <div className="max-w-3xl mx-auto">
      <h2 className="text-[var(--text-primary)] text-xl mb-1" style={{ fontFamily: "'Oswald', sans-serif" }}>
        INFO &amp; ZUGÄNGE
      </h2>
      <p className="text-[var(--text-tertiary)] text-xs mb-4">
        Logins, Portale, Verbandslinks etc. Nur unverschlüsselt gespeichert – für sensible Konten
        besser einen echten Passwort-Manager nutzen.
      </p>

      <div className="bg-[var(--bg-card)] border border-[var(--border-card)] rounded-lg p-4 mb-6">
        <div className="grid grid-cols-2 gap-3 mb-3">
          <input className={inputCls} placeholder="Dienst / Portal" value={draft.service} onChange={(e) => setDraft({ ...draft, service: e.target.value })} />
          <input className={inputCls} placeholder="Benutzername" value={draft.username} onChange={(e) => setDraft({ ...draft, username: e.target.value })} />
          <input className={inputCls} placeholder="Passwort" value={draft.password} onChange={(e) => setDraft({ ...draft, password: e.target.value })} />
          <input className={inputCls} placeholder="Notiz (optional)" value={draft.notes} onChange={(e) => setDraft({ ...draft, notes: e.target.value })} />
        </div>
        <button onClick={add} className="flex items-center gap-1.5 bg-[#c8102e] hover:bg-[#a80d26] text-white text-sm font-semibold px-4 py-2 rounded-md">
          <Plus size={15} /> Eintrag hinzufügen
        </button>
      </div>

      {creds.length === 0 ? (
        <p className="text-[var(--text-tertiary)] text-sm">Noch keine Zugänge gespeichert.</p>
      ) : (
        <div className="space-y-2">
          {creds.map((c) => (
            <div key={c.id} className="bg-[var(--bg-card)] border border-[var(--border-card)] rounded-lg p-3">
              <div className="flex items-center gap-2 mb-2">
                <KeyRound size={14} className="text-[#c8102e] shrink-0" />
                <input
                  className="bg-transparent text-sm font-semibold text-[var(--text-primary)] flex-1 min-w-0 focus:outline-none"
                  value={c.service}
                  onChange={(e) => update(c.id, "service", e.target.value)}
                />
                <button onClick={() => remove(c.id)} className="text-[var(--text-tertiary)] hover:text-[#ff8a8a] shrink-0">
                  <Trash2 size={15} />
                </button>
              </div>
              <div className="grid grid-cols-2 gap-2 pl-6">
                <input
                  className="bg-[var(--bg-input)] border border-[var(--border-input)] rounded-md px-2 py-1.5 text-xs text-[var(--text-body)] focus:outline-none"
                  placeholder="Benutzername"
                  value={c.username}
                  onChange={(e) => update(c.id, "username", e.target.value)}
                />
                <div className="relative">
                  <input
                    type={visible[c.id] ? "text" : "password"}
                    className="w-full bg-[var(--bg-input)] border border-[var(--border-input)] rounded-md px-2 py-1.5 pr-8 text-xs text-[var(--text-body)] focus:outline-none"
                    placeholder="Passwort"
                    value={c.password}
                    onChange={(e) => update(c.id, "password", e.target.value)}
                  />
                  <button
                    onClick={() => toggle(c.id)}
                    className="absolute right-2 top-1/2 -translate-y-1/2 text-[var(--text-tertiary)]"
                  >
                    {visible[c.id] ? <EyeOff size={13} /> : <Eye size={13} />}
                  </button>
                </div>
                <input
                  className="col-span-2 bg-[var(--bg-input)] border border-[var(--border-input)] rounded-md px-2 py-1.5 text-xs text-[var(--text-secondary)] focus:outline-none"
                  placeholder="Notiz"
                  value={c.notes}
                  onChange={(e) => update(c.id, "notes", e.target.value)}
                />
              </div>
            </div>
          ))}
        </div>
      )}
    </div>
  );
}

/*  Tab: Trikotwäsche                                                       */
/* ---------------------------------------------------------------------- */

function LaundryTab({ squad, schedule, laundry, setLaundry }) {
  const [draft, setDraft] = useState({ date: "", opponent: "", jerseyWasherId: "", warmupWasherId: "" });
  const [copyState, setCopyState] = useState("idle"); // idle | copied | failed

  const addEntry = () => {
    if (!draft.date && !draft.opponent.trim()) return;
    setLaundry([...(laundry || []), { id: uid(), ...draft }]);
    setDraft({ date: "", opponent: "", jerseyWasherId: "", warmupWasherId: "" });
  };

  const removeEntry = (id) => setLaundry((laundry || []).filter((e) => e.id !== id));

  const updateEntry = (id, field, value) =>
    setLaundry((laundry || []).map((e) => (e.id === id ? { ...e, [field]: value } : e)));

  const generateFromSchedule = () => {
    if (!squad || squad.length === 0) return;
    const existingKeys = new Set((laundry || []).map((e) => `${e.date}_${e.opponent}`));
    const newFixtures = (schedule || [])
      .filter((f) => !existingKeys.has(`${f.date}_${f.opponent}`))
      .slice()
      .sort((a, b) => (a.date < b.date ? -1 : 1));
    if (newFixtures.length === 0) return;

    const tally = {};
    squad.forEach((p) => {
      tally[p.id] = { jersey: 0, warmup: 0 };
    });
    (laundry || []).forEach((e) => {
      if (e.jerseyWasherId && tally[e.jerseyWasherId]) tally[e.jerseyWasherId].jersey += 1;
      if (e.warmupWasherId && tally[e.warmupWasherId]) tally[e.warmupWasherId].warmup += 1;
    });

    const pickFair = (role, excludeId) => {
      const candidates = squad.filter((p) => p.id !== excludeId);
      if (candidates.length === 0) return "";
      candidates.sort((a, b) => tally[a.id][role] - tally[b.id][role]);
      const chosen = candidates[0];
      tally[chosen.id][role] += 1;
      return chosen.id;
    };

    const newEntries = newFixtures.map((f) => {
      const jerseyId = pickFair("jersey", null);
      const warmupId = pickFair("warmup", jerseyId);
      return { id: uid(), date: f.date, opponent: f.opponent, jerseyWasherId: jerseyId, warmupWasherId: warmupId };
    });

    setLaundry([...(laundry || []), ...newEntries]);
  };

  const counts = useMemo(() => {
    const c = {};
    (squad || []).forEach((p) => {
      c[p.id] = { name: p.name, jersey: 0, warmup: 0 };
    });
    (laundry || []).forEach((e) => {
      if (e.jerseyWasherId && c[e.jerseyWasherId]) c[e.jerseyWasherId].jersey += 1;
      if (e.warmupWasherId && c[e.warmupWasherId]) c[e.warmupWasherId].warmup += 1;
    });
    return Object.values(c).sort((a, b) => a.jersey + a.warmup - (b.jersey + b.warmup));
  }, [squad, laundry]);

  const sorted = (laundry || []).slice().sort((a, b) => (a.date < b.date ? 1 : -1));

  const getPlayerName = (id) => squad.find((p) => p.id === id)?.name || "–";

  const shareMessage = useMemo(() => {
    const chronological = (laundry || []).slice().sort((a, b) => (a.date < b.date ? -1 : 1));
    const lines = ["🧺 Trikot- & Warm-Up-Wäsche", ""];
    chronological.forEach((e) => {
      lines.push(`${formatDateDE(e.date) || "–"}${e.opponent ? ` vs. ${e.opponent}` : ""}`);
      lines.push(`👕 Trikots: ${getPlayerName(e.jerseyWasherId)}`);
      lines.push(`🎽 Warm-Up: ${getPlayerName(e.warmupWasherId)}`);
      lines.push("");
    });
    return lines.join("\n").trim();
    // eslint-disable-next-line react-hooks/exhaustive-deps
  }, [laundry, squad]);

  const handleCopy = async () => {
    const ok = await copyToClipboard(shareMessage);
    setCopyState(ok ? "copied" : "failed");
    setTimeout(() => setCopyState("idle"), 2500);
  };

  return (
    <div className="max-w-3xl mx-auto">
      <h2 className="text-[var(--text-primary)] text-xl mb-4" style={{ fontFamily: "'Oswald', sans-serif" }}>
        TRIKOTWÄSCHE
      </h2>

      <div className="bg-[var(--bg-card)] border border-[var(--border-card)] rounded-lg p-4 mb-6">
        <h3 className="text-[var(--text-primary)] text-sm font-semibold mb-1">Automatisch aus dem Spielplan</h3>
        <p className="text-[var(--text-tertiary)] text-[11px] mb-3">
          Erstellt für alle noch fehlenden Spiele aus dem importierten Spielplan (Tab „Aktuelles Spiel" → „Spielplan")
          automatisch einen Eintrag und verteilt Trikots/Warm-Up fair – wer am wenigsten dran war, kommt zuerst.
        </p>
        <button
          onClick={generateFromSchedule}
          className="flex items-center gap-1.5 bg-[#c8102e] hover:bg-[#a80d26] text-white text-sm font-semibold px-4 py-2 rounded-md"
        >
          <Plus size={15} /> Aus Spielplan generieren
        </button>
      </div>

      <div className="bg-[var(--bg-card)] border border-[var(--border-card)] rounded-lg p-4 mb-6">
        <h3 className="text-[var(--text-primary)] text-sm font-semibold mb-3">Neuer Eintrag</h3>
        <div className="grid grid-cols-2 sm:grid-cols-4 gap-3 mb-3">
          <input
            type="date"
            className={inputCls}
            value={draft.date}
            onChange={(e) => setDraft({ ...draft, date: e.target.value })}
          />
          <input
            className={inputCls}
            placeholder="Gegner (optional)"
            value={draft.opponent}
            onChange={(e) => setDraft({ ...draft, opponent: e.target.value })}
          />
          <select className={inputCls} value={draft.jerseyWasherId} onChange={(e) => setDraft({ ...draft, jerseyWasherId: e.target.value })}>
            <option value="">Trikots wäscht</option>
            {squad.map((p) => (
              <option key={p.id} value={p.id}>{p.name}</option>
            ))}
          </select>
          <select className={inputCls} value={draft.warmupWasherId} onChange={(e) => setDraft({ ...draft, warmupWasherId: e.target.value })}>
            <option value="">Warm-Up wäscht</option>
            {squad.map((p) => (
              <option key={p.id} value={p.id}>{p.name}</option>
            ))}
          </select>
        </div>
        <button onClick={addEntry} className="flex items-center gap-1.5 bg-[#c8102e] hover:bg-[#a80d26] text-white text-sm font-semibold px-4 py-2 rounded-md">
          <Plus size={15} /> Eintragen
        </button>
      </div>

      {sorted.length === 0 ? (
        <p className="text-[var(--text-tertiary)] text-sm mb-6">Noch keine Einträge.</p>
      ) : (
        <div className="space-y-1.5 mb-8">
          {sorted.map((e) => (
            <div key={e.id} className="flex flex-wrap items-center gap-2 bg-[var(--bg-card)] border border-[var(--border-card)] rounded-lg px-3 py-2">
              <div className="w-24 text-xs text-[var(--text-secondary)] shrink-0">{formatDateDE(e.date) || "–"}</div>
              <div className="flex-1 min-w-[80px] text-sm text-[var(--text-primary)] truncate">{e.opponent || "–"}</div>
              <select
                className="bg-[var(--bg-input)] border border-[var(--border-input)] rounded-md text-xs text-[var(--text-body)] px-2 py-1"
                value={e.jerseyWasherId}
                onChange={(ev) => updateEntry(e.id, "jerseyWasherId", ev.target.value)}
              >
                <option value="">Trikots: –</option>
                {squad.map((p) => (
                  <option key={p.id} value={p.id}>{p.name}</option>
                ))}
              </select>
              <select
                className="bg-[var(--bg-input)] border border-[var(--border-input)] rounded-md text-xs text-[var(--text-body)] px-2 py-1"
                value={e.warmupWasherId}
                onChange={(ev) => updateEntry(e.id, "warmupWasherId", ev.target.value)}
              >
                <option value="">Warm-Up: –</option>
                {squad.map((p) => (
                  <option key={p.id} value={p.id}>{p.name}</option>
                ))}
              </select>
              <button onClick={() => removeEntry(e.id)} className="text-[var(--text-tertiary)] hover:text-[#ff8a8a] shrink-0">
                <Trash2 size={15} />
              </button>
            </div>
          ))}
        </div>
      )}

      <div className="bg-[var(--bg-card)] border border-[var(--border-card)] rounded-lg p-4">
        <h3 className="text-[var(--text-primary)] text-sm font-semibold mb-1">Wer war wie oft dran?</h3>
        <p className="text-[var(--text-tertiary)] text-[11px] mb-3">Hilft, die Wäsche fair zu verteilen – wenigste Einsätze zuerst.</p>
        {counts.length === 0 ? (
          <p className="text-[var(--text-tertiary)] text-sm">Erst Spieler im Tab „Kader" anlegen.</p>
        ) : (
          <div className="overflow-x-auto">
            <table className="w-full text-sm">
              <thead>
                <tr className="text-left text-[10px] uppercase tracking-wide text-[var(--text-secondary)] border-b border-[var(--border-card)]">
                  <th className="py-2 pr-2">Spieler</th>
                  <th className="py-2 px-2 text-center">Trikots</th>
                  <th className="py-2 px-2 text-center">Warm-Up</th>
                </tr>
              </thead>
              <tbody>
                {counts.map((c, i) => (
                  <tr key={i} className="border-b border-[var(--bg-input)] text-[var(--text-body)]">
                    <td className="py-1.5 pr-2">{c.name}</td>
                    <td className="py-1.5 px-2 text-center tabular-nums">{c.jersey}</td>
                    <td className="py-1.5 px-2 text-center tabular-nums">{c.warmup}</td>
                  </tr>
                ))}
              </tbody>
            </table>
          </div>
        )}
      </div>

      {sorted.length > 0 && (
        <div className="bg-[var(--bg-card)] border border-[var(--border-card)] rounded-lg p-4 mt-6">
          <h3 className="text-[var(--text-primary)] text-sm font-semibold mb-1">Als Nachricht teilen</h3>
          <p className="text-[var(--text-tertiary)] text-[11px] mb-3">
            Fasst alle Einträge zusammen – kopieren und in eure WhatsApp-Gruppe einfügen.
          </p>
          <pre className="whitespace-pre-wrap break-words bg-[var(--bg-input)] border border-[var(--border-input)] rounded-md p-3 text-sm text-[var(--text-body)] leading-relaxed mb-3">
            {shareMessage}
          </pre>
          <button
            onClick={handleCopy}
            className="w-full flex items-center justify-center gap-2 bg-[#c8102e] hover:bg-[#a80d26] text-white font-semibold py-2.5 rounded-md text-sm"
          >
            <Save size={15} />
            {copyState === "copied" ? "Kopiert!" : copyState === "failed" ? "Kopieren fehlgeschlagen – bitte manuell markieren" : "Nachricht kopieren"}
          </button>
        </div>
      )}
    </div>
  );
}
